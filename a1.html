<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      justify-content: center;

      font-weight: 400;
      color: #e8e2d9;
      letter-spacing: -3px;
      margin-bottom: 0.5rem;
    }
    .level-name {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e8e2d9;
      margin-bottom: 4rem;
    }
    .construction {
      font-family: 'Lora', serif;
      font-size: 1rem;
      color: #e8e2d9;
