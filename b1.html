<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B171NGU3 — B1 Intermediate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: #e8e2d9;
    }

    .header {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    .back {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e8e2d9;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: #ffffff; }
    .header-level {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header-level-code {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -1px;
      color: #e8e2d9;
    }
    .header-level-name {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e8e2d9;
    }
    .header-count {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e8e2d9;
    }

    .books-section {
      padding: 3rem;
    }
    .books-label {
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e8e2d9;
      margin-bottom: 2rem;
    }
    .books-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .book-card {
      width: 200px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s;
    }
    .book-card:hover { transform: translateY(-4px); }

    .book-cover {
      width: 200px;
      height: 280px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) brightness(0.7);
      transition: filter 0.3s;
    }
    .book-card:hover .book-cover img {
      filter: grayscale(100%) brightness(0.9);
    }

    .book-cover-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 1.5rem;
      text-align: center;
    }
    .book-cover-initial {
      font-family: 'Lora', serif;
      font-size: 4rem;
      color: #2a2a2a;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .book-cover-line {
      width: 30px;
      height: 1px;
      background: #2a2a2a;
    }

    .book-info { padding: 0 0.25rem; }
    .book-title {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.25rem;
      color: #e8e2d9;
    }
    .book-title-es {
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      font-style: italic;
      color: #e8e2d9;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .book-author {
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: #e8e2d9;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="header">
    <a class="back" href="index.html">← Return</a>
    <div class="header-level">
      <div class="header-level-code">B1</div>
      <div class="header-level-name">Intermediate</div>
    </div>
    <div class="header-count">1 book</div>
  </div>

  <div class="books-section">
    <div class="books-label">Library</div>
    <div class="books-grid">

      <a class="book-card" href="alicia-ch1.html">
        <div class="book-cover">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Alice_par_John_Tenniel_04.png/440px-Alice_par_John_Tenniel_04.png"
            alt="Alice in Wonderland"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
          >
          <div class="book-cover-fallback" style="display:none;">
            <div class="book-cover-initial">A</div>
            <div class="book-cover-line"></div>
          </div>
        </div>
        <div class="book-info">
          <div class="book-title">Alice in Wonderland</div>
          <div class="book-title-es">Alicia en el País de las Maravillas</div>
          <div class="book-author">Lewis Carroll</div>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
